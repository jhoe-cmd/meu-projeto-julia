name: Run Julia Simulation

on:
  push:
    branches: [ "main" ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.10'

      - name: Install Dependencies
        run: julia -e 'using Pkg; Pkg.add(["FFTW","Plots"])'

      - name: Run Simulation
        run: julia src/main.jl